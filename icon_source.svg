<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
    <clipPath id="sq">
      <rect width="512" height="512" rx="114" ry="114"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" ry="114" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <g clip-path="url(#sq)">
    <circle cx="400" cy="120" r="220" fill="#4338CA" fill-opacity="0.3"/>
    <circle cx="110" cy="420" r="180" fill="#5B21B6" fill-opacity="0.25"/>
  </g>

  <!-- ── Waveform bars (audio / input) ── -->
  <!-- 3 bars, vertically centred around y=256 -->
  <rect x="76"  y="176" width="44" height="160" rx="22" fill="white" fill-opacity="0.95"/>
  <rect x="136" y="204" width="44" height="104" rx="22" fill="white" fill-opacity="0.95"/>
  <rect x="196" y="222" width="44" height="68"  rx="22" fill="white" fill-opacity="0.95"/>

  <!-- ── Tapering connector dots ── -->
  <circle cx="272" cy="244" r="7" fill="white" fill-opacity="0.55"/>
  <circle cx="292" cy="256" r="5" fill="white" fill-opacity="0.40"/>
  <circle cx="308" cy="266" r="3.5" fill="white" fill-opacity="0.28"/>

  <!-- ── Condensed lines (digest / output) ── -->
  <rect x="326" y="198" width="118" height="14" rx="7" fill="white" fill-opacity="0.90"/>
  <rect x="326" y="226" width="94"  height="14" rx="7" fill="white" fill-opacity="0.90"/>
  <rect x="326" y="254" width="106" height="14" rx="7" fill="white" fill-opacity="0.90"/>
  <rect x="326" y="282" width="72"  height="14" rx="7" fill="white" fill-opacity="0.90"/>

  <!-- ── Accent dot: the "." in digest.it ── -->
  <circle cx="452" cy="312" r="26" fill="url(#dotglow)"/>
</svg>
